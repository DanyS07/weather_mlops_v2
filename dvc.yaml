stages:
  collect:
    cmd: python src/collect.py
    deps:
      - src/collect.py
      - params.yaml
    outs:
      - data/raw/

  preprocess:
    cmd: python src/preprocess.py
    deps:
      - src/preprocess.py
      - data/raw/
      - params.yaml
    outs:
      - data/processed/
      - models/scaler_technopark.pkl
      - models/scaler_thampanoor.pkl

  train:
    cmd: python src/train.py
    deps:
      - src/train.py
      - data/processed/
      - params.yaml
    outs:
      - models/technopark_model.pkl
      - models/thampanoor_model.pkl
      - metrics.json
      - version.json