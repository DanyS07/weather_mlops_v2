
name: Daily Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "30 5 * * *"
jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install DVC
        run: pip install dvc

      - name: Run pipeline
        run: dvc repro

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "auto update" || echo "no changes"
          git push